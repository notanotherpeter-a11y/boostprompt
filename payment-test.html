    <div style="margin-top: 40px; padding: 20px; background: #1a1a1a; border-radius: 8px; text-align: left;">
        <h3>🔍 Real Price IDs (Just Created):</h3>
        <p><strong>$19 Pack:</strong> price_1T57ZKAqx5KYvfYDHi6vcvvQ</p>
        <p><strong>$39 Bundle:</strong> price_1T57ZLAqx5KYvfYD2pPT3Vbx</p>

    <script>
        // Initialize Stripe with correct key
        const stripe = Stripe('pk_test_51T2pgj897LP3wGEiM5HP1BmNeV7hXAzpXtJkDouWgqTV9Md7hlfh6EiHhTiN2H2awFMxFCIacAqTqhXuPWOfhqGT50');
        
        function updateStatus(message, type = '') {
            const status = document.getElementById('status');
            status.innerHTML = '<strong>Status:</strong> ' + message;
            status.className = 'status ' + type;
            console.log('[Test]', message);
        }

        async function testPayment19() {
            await testDirectPayment('price_1T57ZKAqx5KYvfYDHi6vcvvQ', '$19 AI Prompts Pack');
        }

        async function testPayment39() {
            await testDirectPayment('price_1T57ZLAqx5KYvfYD2pPT3Vbx', '$39 AI Starter Bundle');
        }

        async function testDirectPayment(priceId, productName) {
            updateStatus(`Testing ${productName}...`);
            
            try {
                console.log('Starting checkout with price ID:', priceId);
                
                // Direct Stripe checkout - minimal parameters
                const result = await stripe.redirectToCheckout({
                    lineItems: [{
                        price: priceId,
                        quantity: 1
                    }],
                    mode: 'payment',
                    successUrl: window.location.origin + '/success.html',
                    cancelUrl: window.location.origin + '/cancel.html'
                });

                if (result.error) {
                    updateStatus('❌ Stripe Error: ' + result.error.message, 'error');
                    console.error('Stripe error:', result.error);
                } else {
                    updateStatus('✅ Redirecting to Stripe...', 'success');
                }

            } catch (error) {
                updateStatus('❌ JavaScript Error: ' + error.message, 'error');
                console.error('Checkout error:', error);
            }
        }

        // Test Stripe loading
        if (typeof Stripe === 'undefined') {
            updateStatus('❌ Stripe.js failed to load', 'error');
        } else {
            updateStatus('✅ Stripe.js loaded, ready for testing', 'success');
        }
    </script>
